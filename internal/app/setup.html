<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kiage 配置</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 24px; max-width: 520px;
      font-family: system-ui, sans-serif; line-height: 1.5;
    }
    h1 { font-size: 20px; margin: 0 0 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; }
    input, select {
      width: 100%; padding: 10px 12px; font-size: 15px;
      border: 1px solid #ccc; border-radius: 6px;
    }
    .field { margin-bottom: 18px; }
    button {
      padding: 10px 20px; font-size: 15px; border: none; border-radius: 6px;
      background: #111; color: #fff; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .hint { font-size: 13px; color: #666; margin-top: 6px; }
    .msg { margin-top: 16px; font-size: 14px; }
    .msg.ok { color: #0a7; }
    .msg.err { color: #c33; }
  </style>
</head>
<body>
  <h1>kiage 配置</h1>
  <div class="field">
    <label for="token">Cursor Session Token</label>
    <input id="token" type="password" autocomplete="off" placeholder="WorkosCursorSessionToken" />
    <p class="hint" id="tokenHint">当前：未配置</p>
  </div>
  <div class="field">
    <label for="glmKey">GLM API Key</label>
    <input id="glmKey" type="password" autocomplete="off" placeholder="智谱 Coding Plan API Key" />
    <p class="hint" id="glmHint">当前：未配置</p>
  </div>
  <div class="field">
    <label for="tz">时区</label>
    <select id="tz">
      <option value="Asia/Shanghai">Asia/Shanghai</option>
      <option value="UTC">UTC</option>
    </select>
  </div>
  <div class="field">
    <label for="interval">自动刷新间隔（秒）</label>
    <input id="interval" type="number" min="60" step="60" />
  </div>
  <button id="saveBtn" onclick="save()">保存</button>
  <p class="msg" id="msg"></p>
  <script>
    function showMsg(text, ok) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + (ok ? 'ok' : 'err');
    }
    async function load() {
      const r = await fetch('/api/config');
      const d = await r.json();
      document.getElementById('tokenHint').textContent = '当前：' + (d.token_hint || '未配置');
      document.getElementById('glmHint').textContent = '当前：' + (d.glm_key_hint || '未配置');
      document.getElementById('tz').value = d.timezone || 'Asia/Shanghai';
      document.getElementById('interval').value = d.refresh_interval_sec || 600;
    }
    async function save() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      showMsg('保存中…', true);
      try {
        const r = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_token: document.getElementById('token').value.trim(),
            glm_api_key: document.getElementById('glmKey').value.trim(),
            timezone: document.getElementById('tz').value,
            refresh_interval_sec: parseInt(document.getElementById('interval').value, 10) || 600,
          }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || '保存失败');
        document.getElementById('token').value = '';
        document.getElementById('glmKey').value = '';
        document.getElementById('tokenHint').textContent = '当前：' + (d.token_hint || '未配置');
        document.getElementById('glmHint').textContent = '当前：' + (d.glm_key_hint || '未配置');
        showMsg('已保存，看板将自动使用新配置', true);
      } catch (e) {
        showMsg(e.message || String(e), false);
      } finally {
        btn.disabled = false;
      }
    }
    load();
  </script>
</body>
</html>
