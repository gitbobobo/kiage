<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>kiage preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #222;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid #333;
      background: #1a1a1a;
    }
    .header-left h1 {
      font-size: 16px;
      font-weight: 500;
      margin: 0;
      white-space: nowrap;
    }
    .header-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .service-url {
      font-size: 12px;
      color: #8ab4f8;
      max-width: min(420px, 40vw);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .service-url:empty { display: none; }
    .service-url a { color: inherit; text-decoration: none; }
    .service-url a:hover { text-decoration: underline; }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    button {
      background: #333;
      color: #eee;
      border: 1px solid #555;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: #444; }
    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .frame-wrap {
      border: 2px solid #444;
      background: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      cursor: crosshair;
      max-width: 100%;
      max-height: 100%;
      height: auto;
    }
    .frame-wrap.landscape {
      aspect-ratio: 1448 / 1072;
      width: min(100%, calc((100vh - 56px) * 1448 / 1072));
    }
    .frame-wrap.portrait {
      aspect-ratio: 1072 / 1448;
      width: min(100%, calc((100vh - 56px) * 1072 / 1448));
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1>kiage · Oasis 预览</h1>
    </div>
    <div class="header-right">
      <span class="service-url" id="serviceUrl"></span>
      <div class="toolbar">
        <button onclick="act('refresh')">手动刷新</button>
        <button onclick="toggleOrient()">横/竖屏</button>
      </div>
    </div>
  </header>
  <main class="main">
    <div class="frame-wrap landscape" id="wrap">
      <img id="frame" src="/frame" alt="dashboard" />
    </div>
  </main>
  <script>
    const frame = document.getElementById('frame');
    const wrap = document.getElementById('wrap');
    const serviceUrlEl = document.getElementById('serviceUrl');
    let layout = null;

    const CLICK_WINDOW_MS = 300;
    const keyClick = {
      ArrowUp: { lastAt: 0, timer: null },
      ArrowDown: { lastAt: 0, timer: null },
    };

    function setServiceUrl(text, href) {
      serviceUrlEl.textContent = '';
      serviceUrlEl.replaceChildren();
      if (!text) return;
      if (href) {
        const a = document.createElement('a');
        a.href = href;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = text;
        serviceUrlEl.appendChild(a);
      } else {
        serviceUrlEl.textContent = text;
      }
    }

    function inRect(x, y, r) {
      return x >= r.x && x < r.x + r.w && y >= r.y && y < r.y + r.h;
    }

    function canvasPoint(e) {
      const rect = wrap.getBoundingClientRect();
      const iw = layout?.width || frame.naturalWidth || 1448;
      const ih = layout?.height || frame.naturalHeight || 1072;
      const scale = Math.min(rect.width / iw, rect.height / ih);
      const dispW = iw * scale;
      const dispH = ih * scale;
      const offX = (rect.width - dispW) / 2;
      const offY = (rect.height - dispH) / 2;
      const lx = e.clientX - rect.left - offX;
      const ly = e.clientY - rect.top - offY;
      return { x: lx / scale, y: ly / scale };
    }

    async function loadLayout() {
      const r = await fetch('/api/layout');
      layout = await r.json();
      syncServiceUrl();
    }

    function syncServiceUrl() {
      if (!layout) return;
      const active = !!layout.settings_active;
      if (active && layout.settings_url) {
        setServiceUrl(layout.settings_url, layout.settings_url);
      } else {
        setServiceUrl('');
      }
    }

    function refresh() { frame.src = '/frame?t=' + Date.now(); }

    async function refreshDashboard() {
      const r = await fetch('/api/action?name=refresh', { method: 'POST' });
      const d = await r.json();
      if (d.skipped) {
        setServiceUrl('正在刷新，请稍候…');
      } else if (d.started) {
        setServiceUrl('刷新中…');
        refresh();
        await loadLayout();
      }
    }

    async function act(name) {
      if (name === 'refresh') {
        await refreshDashboard();
        return;
      }
      const r = await fetch('/api/action?name=' + name, { method: 'POST' });
      if (name === 'toggle_settings') {
        const d = await r.json();
        if (layout) {
          layout.settings_active = !!d.settings_active;
          layout.settings_url = d.settings_url || '';
        }
        syncServiceUrl();
        if (d.error) setServiceUrl('设置服务：' + d.error);
        else if (!d.settings_active) setServiceUrl('');
      }
      refresh();
      if (name !== 'toggle_settings') await loadLayout();
    }

    function toggleOrient() {
      const portrait = wrap.classList.contains('portrait');
      wrap.className = 'frame-wrap ' + (portrait ? 'landscape' : 'portrait');
      fetch('/api/action?name=orientation', { method: 'POST' }).then(async () => {
        await loadLayout();
        refresh();
      });
    }

    function handleArrowKey(key) {
      const state = keyClick[key];
      const now = Date.now();
      if (state.lastAt && now - state.lastAt < CLICK_WINDOW_MS) {
        if (state.timer) {
          clearTimeout(state.timer);
          state.timer = null;
        }
        state.lastAt = 0;
        if (key === 'ArrowUp') act('toggle_metric');
        else act('exit');
        return;
      }
      state.lastAt = now;
      if (state.timer) clearTimeout(state.timer);
      state.timer = setTimeout(() => {
        state.timer = null;
        state.lastAt = 0;
        if (key === 'ArrowUp') act('toggle_provider');
        else act('toggle_settings');
      }, CLICK_WINDOW_MS);
    }

    wrap.addEventListener('click', (e) => {
      if (!layout?.regions?.provider_title) return;
      const p = canvasPoint(e);
      if (inRect(p.x, p.y, layout.regions.provider_title)) {
        refreshDashboard();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        handleArrowKey(e.key);
      }
      if (e.key === 'r' || e.key === 'R') act('refresh');
    });

    loadLayout().then(refresh);
    setInterval(async () => { await loadLayout(); refresh(); }, 5000);
  </script>
</body>
</html>
